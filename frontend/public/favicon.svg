<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <circle cx="16" cy="16" r="15" fill="#1E3A8A"/>

  <!-- Bird body - simplified -->
  <ellipse cx="13" cy="18" rx="7" ry="5" fill="#4169E1"/>

  <!-- Bird head -->
  <circle cx="10" cy="13" r="5" fill="#4169E1"/>

  <!-- Eye -->
  <circle cx="8" cy="12" r="1.5" fill="white"/>
  <circle cx="8" cy="12" r="0.8" fill="#0F172A"/>

  <!-- Beak - singing -->
  <path d="M5 13 L2 11.5 L5 14.5 Z" fill="#8B7355"/>

  <!-- Tail -->
  <path d="M20 17 L26 14 L24 20 Z" fill="#4169E1"/>

  <!-- Musical note -->
  <ellipse cx="15" cy="6" rx="2" ry="1.5" fill="#5B9BD5"/>
  <rect x="16.5" y="3" width="1.5" height="4" fill="#5B9BD5"/>

  <!-- Microphone (simplified) -->
  <rect x="24" y="10" width="4" height="6" rx="2" fill="#5B9BD5"/>
  <rect x="25" y="16" width="2" height="8" fill="#5B9BD5"/>

  <!-- Sound wave -->
  <path d="M3 10 Q1 13 3 15" stroke="#5B9BD5" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
