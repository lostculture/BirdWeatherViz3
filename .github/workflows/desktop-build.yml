name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write  # needed for uploading release assets

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: birdweatherviz3-windows-x64
            ext: .zip
          - os: macos-latest
            artifact: birdweatherviz3-macos-arm64
            ext: .tar.gz
          - os: ubuntu-latest
            artifact: birdweatherviz3-linux-x64
            ext: .tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # --- Frontend build ---
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: bun run build

      # --- Backend + PyInstaller ---
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt -r requirements-desktop.txt
          pip install pyinstaller>=6.0

      # Linux: install WebKitGTK for pywebview
      - name: Install WebKitGTK (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev

      - name: Build with PyInstaller
        run: pyinstaller birdweatherviz.spec

      # --- Package ---
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/BirdWeatherViz3/* -DestinationPath ${{ matrix.artifact }}${{ matrix.ext }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: tar -czf ${{ matrix.artifact }}${{ matrix.ext }} -C dist BirdWeatherViz3

      # --- Upload ---
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}${{ matrix.ext }}
          retention-days: 30

      # Attach to GitHub Release if triggered by tag
      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}${{ matrix.ext }}
