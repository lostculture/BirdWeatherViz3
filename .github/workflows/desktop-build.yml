name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write  # needed for uploading release assets

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: birdweatherviz3-windows-x64
            ext: .zip
          - os: macos-latest
            artifact: birdweatherviz3-macos-arm64
            ext: .tar.gz
          - os: macos-14
            artifact: birdweatherviz3-macos-x64
            arch: x86_64
            ext: .tar.gz
          - os: ubuntu-latest
            artifact: birdweatherviz3-linux-x64
            ext: .tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      # --- Frontend build ---
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: bun run build

      # --- Backend + PyInstaller ---
      - uses: actions/setup-python@v5
        if: matrix.arch != 'x86_64'
        with:
          python-version: '3.11'
          cache: 'pip'

      # Intel macOS via Rosetta: install x86_64 Python manually
      - name: Install x86_64 Python (Rosetta)
        if: matrix.arch == 'x86_64'
        run: |
          arch -x86_64 /bin/bash -c '
            curl -L https://www.python.org/ftp/python/3.11.9/python-3.11.9-macos11.pkg -o python.pkg
            sudo installer -pkg python.pkg -target /
          '
          echo "/Library/Frameworks/Python.framework/Versions/3.11/bin" >> $GITHUB_PATH

      - name: Install backend dependencies
        working-directory: backend
        run: |
          ${{ matrix.arch == 'x86_64' && 'arch -x86_64' || '' }} pip3.11 install -r requirements.txt -r requirements-desktop.txt
          ${{ matrix.arch == 'x86_64' && 'arch -x86_64' || '' }} pip3.11 install pyinstaller>=6.0

      # Linux: install WebKitGTK for pywebview
      - name: Install WebKitGTK (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev

      - name: Build with PyInstaller
        run: ${{ matrix.arch == 'x86_64' && 'arch -x86_64' || '' }} pyinstaller birdweatherviz.spec

      # --- Package ---
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/BirdWeatherViz3/* -DestinationPath ${{ matrix.artifact }}${{ matrix.ext }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: tar -czf ${{ matrix.artifact }}${{ matrix.ext }} -C dist BirdWeatherViz3

      # --- Upload ---
      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}${{ matrix.ext }}
          retention-days: 30

      # Attach to GitHub Release if triggered by tag
      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}${{ matrix.ext }}
