services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Persistent storage for SQLite database
      - birdweather-data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/db/birdweather.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  birdweather-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: C:\Docker\BirdWeatherViz3_docker
