services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    volumes:
      # Persistent storage for SQLite database
      - birdweather-data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/db/birdweather.db
      - CONFIG_PASSWORD=birdsecure123
      - JWT_SECRET=birdweather-jwt-secret-change-in-production
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  birdweather-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/richardj/birdweatherviz3-data/data
