# BirdWeatherViz3 - Local Development
# For production/public deployment, use docker-compose.public.yml
#
# Usage:
#   1. Copy backend/.env.example to backend/.env and configure
#   2. Run: docker compose up -d

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    volumes:
      - birdweather-data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/db/birdweather.db
      - CONFIG_PASSWORD=${CONFIG_PASSWORD:?Set CONFIG_PASSWORD in .env or environment}
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in .env or environment}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      - DEBUG=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  birdweather-data:
