# Docker Compose for Public Instance - LOCAL TESTING
#
# This version exposes ports for local testing before adding Cloudflare.
# Once tested, use docker-compose.public.yml with Cloudflare tunnel.
#
# Uses pre-built images from GitHub Container Registry.
#
# Usage:
#   docker compose -f docker-compose.public-test.yml --env-file .env.public up -d

services:
  backend:
    image: ghcr.io/lostculture/birdweatherviz3-backend:latest
    container_name: birdweatherviz3-backend-public
    # Expose on different ports than local dev instance
    ports:
      - "8002:8000"
    volumes:
      - birdweather-public-data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/db/birdweather.db
      - CONFIG_PASSWORD=${CONFIG_PASSWORD:?CONFIG_PASSWORD must be set in .env.public}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set in .env.public}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      - CORS_ORIGINS=["http://localhost:3004", "http://127.0.0.1:3004"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - birdweather-public-net

  frontend:
    image: ghcr.io/lostculture/birdweatherviz3-frontend:latest
    container_name: birdweatherviz3-frontend-public
    # Expose on different port than local dev instance
    ports:
      - "3004:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - birdweather-public-net

networks:
  birdweather-public-net:
    driver: bridge

volumes:
  # Bind mount — your data lives in $DATA_DIR on the host so a stray
  # `docker compose down -v`, `docker volume prune`, or a Docker reset can't
  # take it with them. Set DATA_DIR before running compose; the README's
  # Quick Start does this for you.
  birdweather-public-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR:?DATA_DIR must be set to an absolute path on the host (see README Quick Start)}
